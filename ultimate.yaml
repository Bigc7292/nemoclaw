version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  read_write:
  - /sandbox
  - /tmp
  - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  openclaw_full:
    name: openclaw_full
    endpoints:
    - host: api.telegram.org
      port: 443
    - host: "*.com"
      port: 443
    - host: "*.org"
      port: 443
    - host: "*.net"
      port: 443
    - host: "*.edu"
      port: 443
    - host: "*.gov"
      port: 443
    - host: "*.io"
      port: 443
    - host: "*.ai"
      port: 443
    - host: integrate.api.nvidia.com
      port: 443
    binaries:
    - path: /usr/bin/openclaw
    - path: /usr/bin/curl
    - path: /usr/bin/node
    - path: /bin/bash
    - path: /sandbox/.venv/bin/python
    - path: /sandbox/.venv/bin/python3
